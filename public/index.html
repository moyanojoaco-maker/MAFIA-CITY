<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Metaetiqueta crucial para que se adapte a pantallas de celulares sin hacer zoom raro -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Juego</title>
    <script src="https://tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Ajuste para evitar problemas visuales con el teclado desplegado en celulares */
        body { min-height: -webkit-fill-available; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <!-- 1. PANTALLA DE INGRESO -->
    <div id="pantalla-ingreso" class="bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-700">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-400 tracking-wide uppercase">Ingreso al Juego</h2>
        
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Tu Nombre o Apodo</label>
        <input id="input-nombre" type="text" placeholder="Ej: Juan" class="w-full p-4 mb-6 rounded-xl bg-gray-700 border border-gray-600 text-base focus:outline-none focus:border-amber-500 appearance-none">
        
        <div class="flex flex-col gap-3">
            <button onclick="unirseComo('jugador')" class="w-full bg-emerald-600 active:bg-emerald-700 p-4 rounded-xl font-bold text-lg shadow-lg transition transform active:scale-95">
                🙋‍♂️ Ser Jugador
            </button>
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-sm">ó</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>
            <button onclick="unirseComo('dios')" class="w-full bg-amber-500 active:bg-amber-600 text-gray-950 p-4 rounded-xl font-black text-lg shadow-lg transition transform active:scale-95">
                ⚡ SER DIOS
            </button>
        </div>
    </div>

    <!-- 2. VISTA DEL JUGADOR -->
    <div id="vista-jugador" class="hidden bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-700">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold text-emerald-400">Panel Jugador</h2>
            <span id="nombre-jugador" class="text-xs bg-gray-700 px-3 py-1 rounded-full text-gray-300"></span>
        </div>
        
        <p class="text-sm text-gray-400 mb-4">Tu mensaje se enviará directamente a Dios de forma privada.</p>
        
        <textarea id="msg-texto" placeholder="Escribe tu mensaje secreto aquí..." class="w-full p-4 h-40 mb-4 rounded-xl bg-gray-700 border border-gray-600 text-base resize-none focus:outline-none focus:border-emerald-500 appearance-none"></textarea>
        
        <button onclick="enviarMensaje()" class="w-full bg-emerald-600 active:bg-emerald-700 p-4 rounded-xl font-bold text-lg shadow-md transition transform active:scale-95">
            Enviar a Dios ✉️
        </button>
    </div>

    <!-- 3. VISTA DE DIOS -->
    <div id="vista-dios" class="hidden bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700 my-auto">
        <h2 class="text-2xl font-black mb-1 text-amber-400 flex items-center gap-2 justify-center">⚡ OMNISCENCIA ⚡</h2>
        <p class="text-center text-xs text-amber-200/60 uppercase font-semibold tracking-wider mb-6">Estás escuchando a los mortales</p>
        
        <!-- Contenedor optimizado para hacer scroll en celular -->
        <div id="lista-mensajes" class="space-y-3 max-h-[60vh] overflow-y-auto pr-1 pb-4">
            <p id="sin-mensajes" class="text-center text-gray-500 py-8 italic text-sm">Esperando plegarias de los jugadores...</p>
        </div>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function unirseComo(rol) {
            const input = document.getElementById('input-nombre');
            miNombre = input.value.trim();
            
            if (!miNombre) return alert("Por favor, ingresa tu nombre.");

            document.getElementById('pantalla-ingreso').classList.add('hidden');

            if (rol === 'dios') {
                socket.emit('declarar-dios');
                document.getElementById('vista-dios').classList.remove('hidden');
            } else {
                document.getElementById('nombre-jugador').innerText = miNombre;
                document.getElementById('vista-jugador').classList.remove('hidden');
            }
        }

        // Lógica de los jugadores
        function enviarMensaje() {
            const txtArea = document.getElementById('msg-texto');
            const texto = txtArea.value.trim();
            if (!texto) return;

            socket.emit('enviar-mensaje', { nombre: miNombre, texto: texto });
            txtArea.value = ""; 
            alert("¡Mensaje enviado a Dios!");
        }

        // Lógica de Dios
        socket.on('mensaje-recibido', (datos) => {
            const sinMensajes = document.getElementById('sin-mensajes');
            if (sinMensajes) sinMensajes.remove();

            const contenedor = document.getElementById('lista-mensajes');
            const nuevoMensaje = document.createElement('div');
            
            // Estilo táctil y limpio para los globos de texto
            nuevoMensaje.className ="bg-gray-700/50 p-4 rounded-xl border-l-4 border-amber-500 shadow-md break-words";
            nuevoMensaje.innerHTML = `<span class="block text-xs font-black tracking-wide uppercase text-amber-400">${datos.remitente}</span> <p class="mt-1 text-gray-100 text-base">${datos.texto}</p>`;
            
            contenedor.prepend(nuevoMensaje);
        });

        socket.on('error-sistema', (msg) => alert(msg));
    </script>
</body>
</html>
